<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Login</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .message {
            text-align: center;
            margin-top: 10px;
            color: red;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }

        .link a {
            text-decoration: none;
            color: #667eea;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Hospital Login</h2>

    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>

    <button onclick="login()">Login</button>

    <div class="message" id="message"></div>

    <div class="link">
        New hospital? <a href="/signup">Sign Up</a>
    </div>
</div>

<script>
function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        const msg = document.getElementById("message");

        if (data.success) {
            msg.style.color = "green";
            msg.innerHTML = "Login successful! Redirecting...";

            // redirect to homepage
            setTimeout(() => {
                window.location.href = "/";
            }, 1000);

        } else {
            msg.style.color = "red";
            msg.innerHTML = data.error || "Login failed";
        }
    })
    .catch(() => {
        document.getElementById("message").innerHTML = "Server error";
    });
}
</script>

</body>
</html>
