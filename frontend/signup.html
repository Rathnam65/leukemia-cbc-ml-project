<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hospital Registration</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f7fb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: #ffffff;
    padding: 40px;
    width: 380px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* Header */
h2 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 25px;
}

/* Labels */
label {
    font-size: 14px;
    color: #555;
    margin-top: 10px;
    display: block;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
    outline: none;
}

input:focus {
    border-color: #2d9cdb;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #2d9cdb;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #238ac9;
}

/* Message */
.message {
    text-align: center;
    margin-top: 15px;
}

/* Link */
.link {
    text-align: center;
    margin-top: 15px;
}

.link a {
    color: #2d9cdb;
    text-decoration: none;
    font-weight: 500;
}
</style>
</head>

<body>

<div class="container">
    <h2>Hospital Registration</h2>

    <label>Hospital Name</label>
    <input type="text" id="hospital">

    <label>Username</label>
    <input type="text" id="username">

    <label>Password</label>
    <input type="password" id="password">

    <label>Confirm Password</label>
    <input type="password" id="confirm">

    <button onclick="signup()">Create Account</button>

    <div class="message" id="message"></div>

    <div class="link">
        Already registered? <a href="/login">Sign In</a>
    </div>
</div>

<script>
function signup() {
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if (password !== confirm) {
        alert("Passwords do not match");
        return;
    }

    fetch("/signup", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            hospital_name: document.getElementById("hospital").value,
            username: document.getElementById("username").value,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        const msg = document.getElementById("message");

        if (data.message) {
            msg.style.color = "green";
            msg.innerHTML = data.message;
            setTimeout(() => window.location.href = "/login", 1500);
        } else {
            msg.style.color = "red";
            msg.innerHTML = data.error;
        }
    });
}
</script>

</body>
</html>
